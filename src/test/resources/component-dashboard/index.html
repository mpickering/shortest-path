<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map Component Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <section class="sidebar">
      <h1>Map Component Viewer</h1>
      <p id="summary">Loading report...</p>
      <label class="search">
        <span>Search components</span>
        <input id="component-search" type="search" placeholder="e.g. 42 3185 3436 fairy">
      </label>
      <pre id="component-details">Select a component to inspect its bounds and transport markers.</pre>
      <label class="toggle">
        <input id="entries-toggle" type="checkbox" checked>
        <span>Show entry markers</span>
      </label>
      <label class="toggle">
        <input id="exits-toggle" type="checkbox" checked>
        <span>Show exit markers</span>
      </label>
      <label class="toggle">
        <input id="all-bounds-toggle" type="checkbox">
        <span>Show all bounding boxes</span>
      </label>
      <button id="center-component" type="button">Center on component</button>
      <ol id="component-list"></ol>
    </section>
    <section class="map-panel">
      <div id="map"></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
