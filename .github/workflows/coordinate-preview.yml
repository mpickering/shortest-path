name: Coordinate Preview

on:
  pull_request:
  workflow_dispatch:

jobs:
  preview-coordinates:
    name: Preview Changed Coordinates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Make Gradle wrapper executable
        run: |
          chmod +x gradlew
          chmod +x scripts/diff-coordinate-json.js

      - id: compute-coordinates
        name: Compute changed coordinates
        shell: bash
        run: |
          set -euo pipefail

          MERGE_BASE="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          BASE_DIR="$(mktemp -d)"
          BASE_COORDINATES_PATH="${{ runner.temp }}/base-coordinates.json"

          git worktree add "$BASE_DIR" "$MERGE_BASE"
          trap 'git worktree remove --force "$BASE_DIR"' EXIT

          ./gradlew --no-daemon dumpTransportCoordinates --args="--output build/head-coordinates.json"
          (
            cd "$BASE_DIR"
            chmod +x gradlew
            ./gradlew --no-daemon dumpTransportCoordinates --args="--output build/base-coordinates.json"
          )
          cp "$BASE_DIR/build/base-coordinates.json" "$BASE_COORDINATES_PATH"
          node scripts/diff-coordinate-json.js \
            "$BASE_COORDINATES_PATH" \
            build/head-coordinates.json \
            build/changed-coordinates.json
          if [ "$(cat build/changed-coordinates.json)" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_COORDINATES_PATH: ${{ runner.temp }}/base-coordinates.json

      - name: Preview coordinates
        if: ${{ steps.compute-coordinates.outputs.has_changes == 'true' }}
        uses: mpickering/osrs-coord-preview-action@v1
        with:
          coordinates-file: build/changed-coordinates.json
          comment: "true"
          renderer-url: https://osrs-coordinate-preview-nt7ywvsdgq-nw.a.run.app/render
          github-token: ${{ github.token }}
