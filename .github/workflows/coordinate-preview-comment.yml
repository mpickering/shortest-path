name: Coordinate Preview Comment

# Renders coordinate previews and posts / updates the comment on PRs.
# Runs after the unprivileged "Coordinate Preview" workflow completes, so it
# has pull-requests:write without ever executing PR code.
on:
  workflow_run:
    workflows: ["Coordinate Preview"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Render and Post Preview Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download coordinate results
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const match = artifacts.data.artifacts.find(a => a.name === 'coordinate-preview-results');
            if (!match) {
              core.info('No coordinate-preview-results artifact — nothing to render.');
              core.exportVariable('SKIP_COMMENT', 'true');
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/artifact.zip', Buffer.from(download.data));

      - name: Unpack artifact
        if: env.SKIP_COMMENT != 'true'
        id: unpack
        run: |
          unzip artifact.zip -d artifact
          mkdir -p build
          cp artifact/changed-coordinates.json build/
          echo "number=$(cat pr-number.txt)" >> "$GITHUB_OUTPUT"

      - name: Render coordinate previews
        if: env.SKIP_COMMENT != 'true'
        uses: mpickering/osrs-coord-preview-action@bac4457a71f6aa8193424648ade7a8ccca74884b
        with:
          coordinates-file: build/changed-coordinates.json
          comment: "true"
          renderer-url: https://osrs-coordinate-preview-nt7ywvsdgq-nw.a.run.app/render
          pr-number: ${{ steps.unpack.outputs.number }}
          github-token: ${{ github.token }}
          output-dir: build/preview
