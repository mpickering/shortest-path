tasks.register('heuristicVisualizerSearchSpaceAbstractGraph', JavaExec) {
    group = 'verification'
    description = 'Renders the fixed search-space visualization using the abstract graph heuristic'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--heuristic', 'abstract-graph',
        '--start', '3222,3218,0',
        '--goal', '1760,3846,0',
        '--show-visited',
        '--show-path',
        '--render-all-transport-masks',
        '--output', 'build/heuristic-visualizer/search-space-abstract-graph.png'
}

