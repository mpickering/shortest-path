test {
    jvmArgs = ['-Xms1g', '-Xmx8g']
}

tasks.register('clueStepsDashboard', Test) {
    group = 'verification'
    description = 'Builds the clue steps dashboard bundle'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnit()
    include 'shortestpath/reachability/ReachabilityDashboardTest.class'
    ignoreFailures = true
    systemProperty 'runReachabilityVerification', 'true'
    systemProperty 'reachability.dataset', clueStepsDashboardDataset.get()
    systemProperty 'reachability.bundleId', 'clue-steps-default'
    systemProperty 'reachability.reportTitle', 'Clue Steps'
    systemProperty 'reachability.reportSubtitle', 'Clue steps sweep from bank start'
    systemProperty 'dashboard.outputRoot', dashboardOutputRoot.get().asFile.absolutePath
    jvmArgs = ['-Xms1g', '-Xmx8g']
    doLast {
        logDashboardLocation(name)
    }
}

tasks.register('targetsDashboard', Test) {
    group = 'verification'
    description = 'Builds the lightweight reported-targets dashboard bundle'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnit()
    include 'shortestpath/reachability/ReachabilityDashboardTest.class'
    ignoreFailures = true
    systemProperty 'runReachabilityVerification', 'true'
    systemProperty 'reachability.dataset', targetsDashboardDataset.get()
    systemProperty 'reachability.bundleId', 'reported-targets'
    systemProperty 'reachability.reportTitle', 'Reported Targets'
    systemProperty 'reachability.reportSubtitle', 'Lightweight regression targets from targets.csv'
    systemProperty 'dashboard.outputRoot', dashboardOutputRoot.get().asFile.absolutePath
    jvmArgs = ['-Xms1g', '-Xmx8g']
    doLast {
        logDashboardLocation(name)
    }
}

tasks.register('scenarioDashboard', Test) {
    group = 'verification'
    description = 'Builds the pathfinder scenario dashboard bundle'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnit()
    include 'shortestpath/pathfinder/PathfinderTest.class'
    ignoreFailures = true
    systemProperty 'dashboard.outputRoot', dashboardOutputRoot.get().asFile.absolutePath
    jvmArgs = ['-Xms1g', '-Xmx8g']
    doLast {
        logDashboardLocation(name)
    }
}

tasks.register('dashboardSite') {
    group = 'verification'
    description = 'Builds the shared dashboard site containing all dashboard bundles'
    dependsOn tasks.named('scenarioDashboard')
    dependsOn tasks.named('clueStepsDashboard')
    dependsOn tasks.named('targetsDashboard')
    doLast {
        logDashboardLocation(name)
    }
}

jmh {
    includes = ['shortestpath\\.benchmark\\.ReachabilityBenchmark.*']
    warmupIterations = 5
    iterations = 10
    fork = 1
    benchmarkMode = ['avgt']
    timeUnit = 'ms'
    resultFormat = 'JSON'
    resultsFile = layout.buildDirectory.file('reports/jmh/results.json').get().asFile
}

tasks.register('jmhReachability') {
    group = 'verification'
    description = 'Runs the generated clue reachability JMH benchmarks'
    dependsOn tasks.named('jmh')
}

tasks.named('jmhJar') {
    exclude 'org/slf4j/impl/StaticLoggerBinder.class'
    exclude 'org/slf4j/impl/StaticMDCBinder.class'
    exclude 'org/slf4j/impl/StaticMarkerBinder.class'
    exclude 'logback.xml'
}

jacoco {
    toolVersion = "0.8.11"
}

tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')
    reports {
        xml.required = true
        xml.outputLocation = layout.buildDirectory.file('reports/jacoco/test/jacocoTestReport.xml')
        html.required = true
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/test/html')
    }
}

// Convenience task to start the RuneLite client with the ShortestPathPlugin
tasks.register('runelite', JavaExec) {
    group = 'application'
    description = 'Runs shortestpath.ShortestPathPluginTest with assertions enabled'
    classpath = sourceSets.test.runtimeClasspath
    mainClass.set('shortestpath.ShortestPathPluginTest')
    jvmArgs '-ea'
    args '--developer-mode'
}

tasks.register('mapComponentAnalysis', JavaExec) {
    group = 'verification'
    description = 'Computes walkable world-map components and transport links between them'
    classpath = sourceSets.test.runtimeClasspath
    mainClass.set('shortestpath.analysis.MapComponentAnalysis')
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--output', layout.buildDirectory.file('reports/component-dashboard/report.json').get().asFile.absolutePath
    args '--pretty'
}
