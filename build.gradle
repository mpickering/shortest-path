    description = 'Renders the map component analysis as a component-colored PNG'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--mode', 'COMPONENTS',
        '--output', 'build/heuristic-visualizer/components.png'
}

tasks.register('heuristicVisualizerComponentHeuristic', JavaExec) {
    group = 'verification'
    description = 'Renders the component-based teleport lower-bound heuristic'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--mode', 'HEURISTIC_VALUE',
        '--heuristic', 'component-teleport',
        '--goal', '1503,3553,0',
        '--output', 'build/heuristic-visualizer/component-heuristic.png'
}

tasks.register('heuristicVisualizerAbstractGraphHeuristic', JavaExec) {
    group = 'verification'
    description = 'Renders the abstract-graph transport lower-bound heuristic'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--mode', 'HEURISTIC_VALUE',
        '--heuristic', 'abstract-graph',
        '--goal', '1503,3553,0',
        '--output', 'build/heuristic-visualizer/abstract-graph-heuristic.png'
