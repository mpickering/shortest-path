plugins {
    id 'java'
    id 'jacoco'
    id 'me.champeau.jmh' version '0.7.2'
}

repositories {
    mavenLocal()
    maven { url = 'https://repo.runelite.net' }
    mavenCentral()
}

configurations.matching { it.name.toLowerCase(Locale.ROOT).startsWith('jmh') }.all {
    exclude group: 'org.slf4j', module: 'slf4j-simple'
}

def runeLiteVersion = 'latest.release'

dependencies {
    compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:3.4.6'
    testImplementation 'org.apache.commons:commons-csv:1.11.0'
    testImplementation 'com.google.code.gson:gson:2.10.1'
    testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
    testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion

    jmhImplementation 'org.mockito:mockito-core:3.4.6'
    jmhImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
    jmhImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'shortestpath'
version = '1.18.0'
sourceCompatibility = '1.11'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

def dashboardOutputRoot = layout.buildDirectory.dir('reports/pathfinder-dashboard')
def clueStepsDashboardDataset = providers.gradleProperty('clueStepsDashboardDataset')
    .orElse('/reachability/clue_locations_full.csv')
def targetsDashboardDataset = providers.gradleProperty('targetsDashboardDataset')
    .orElse('/reachability/targets.csv')

def logDashboardLocation = { String taskName ->
    File dashboardDir = dashboardOutputRoot.get().asFile
    logger.lifecycle("")
    logger.lifecycle("${taskName} dashboard written.")
    logger.lifecycle("Serve it locally with:")
    logger.lifecycle("  python -m http.server --directory ${dashboardDir.absolutePath} 8000")
    logger.lifecycle("Then open: http://localhost:8000")
}

def reachabilityBenchmarkCsv = providers.gradleProperty('reachabilityBenchmarkCsv')
    .orElse(file('src/test/resources/reachability/clue_locations_full.csv').absolutePath)

def generatedBenchmarkSourceDir = layout.buildDirectory.dir('generated/sources/reachability-benchmarks/jmh')

def escapeJava = { String value ->
    value
        .replace('\\', '\\\\')
        .replace('"', '\\"')
}

def benchmarkScenarioId = { String clueType, int x, int y, int plane ->
    String slug = clueType
        .toLowerCase(Locale.ROOT)
        .replaceAll('[^a-z0-9]+', '_')
        .replaceAll('^_+|_+$', '')
    return "${slug}_${x}_${y}_${plane}"
}

def renderGeneratedBenchmarkSource = { List<Map<String, Object>> scenarios ->
    String ids = scenarios.collect { "            \"${escapeJava(it.id as String)}\"" }.join(",\n")
    String cases = scenarios.collect {
        """            case "${escapeJava(it.id as String)}":
                return new Scenario("${escapeJava(it.id as String)}", "${escapeJava(it.clueType as String)}", ${it.x}, ${it.y}, ${it.plane});"""
    }.join("\n")

    return """package shortestpath.benchmark.generated;

import org.openjdk.jmh.annotations.Param;
import org.openjdk.jmh.annotations.Scope;
import org.openjdk.jmh.annotations.State;

public final class GeneratedReachabilityBenchmarkScenarios {
    private GeneratedReachabilityBenchmarkScenarios() {
    }

    @State(Scope.Benchmark)
    public static class ScenarioState {
        @Param({
${ids}
        })
        public String scenarioId;
    }

    public static Scenario byId(String id) {
        switch (id) {
${cases}
            default:
                throw new IllegalArgumentException("Unknown reachability benchmark scenario: " + id);
        }
    }

    public static final class Scenario {
        private final String id;
        private final String clueType;
        private final int x;
        private final int y;
        private final int plane;

        public Scenario(String id, String clueType, int x, int y, int plane) {
            this.id = id;
            this.clueType = clueType;
            this.x = x;
            this.y = y;
            this.plane = plane;
        }

        public String getId() {
            return id;
        }

        public String getClueType() {
            return clueType;
        }

        public int getX() {
            return x;
        }

        public int getY() {
            return y;
        }

        public int getPlane() {
            return plane;
        }
    }
}
"""
}

tasks.register('generateReachabilityBenchmarkParams') {
    description = 'Generates JMH benchmark scenario params from the clue reachability CSV'
    inputs.file(reachabilityBenchmarkCsv)
    outputs.dir(generatedBenchmarkSourceDir)

    doLast {
        File csvFile = file(reachabilityBenchmarkCsv.get())
        if (!csvFile.exists()) {
            throw new GradleException("Reachability benchmark CSV not found: ${csvFile}")
        }

        File outputDir = generatedBenchmarkSourceDir.get().file('shortestpath/benchmark/generated').asFile
        outputDir.mkdirs()

        List<String> lines = csvFile.readLines('UTF-8')
        if (lines.isEmpty()) {
            throw new GradleException("Reachability benchmark CSV is empty: ${csvFile}")
        }

        List<String> headers = lines[0].split(',', -1) as List<String>
        int clueTypeIndex = headers.indexOf('clue_type')
        int xIndex = headers.indexOf('x')
        int yIndex = headers.indexOf('y')
        int planeIndex = headers.indexOf('plane')
        if ([clueTypeIndex, xIndex, yIndex, planeIndex].any { it < 0 }) {
            throw new GradleException("Reachability benchmark CSV is missing one of: clue_type, x, y, plane")
        }

        Map<String, Map<String, Object>> scenarios = new LinkedHashMap<>()
        lines.drop(1).each { String line ->
            if (line.isBlank()) {
                return
            }

            String[] fields = line.split(',', 6)
            int x = Integer.parseInt(fields[xIndex])
            int y = Integer.parseInt(fields[yIndex])
            int plane = Integer.parseInt(fields[planeIndex])
            String pointKey = "${x},${y},${plane}"
            scenarios.putIfAbsent(pointKey, [
                id         : benchmarkScenarioId(fields[clueTypeIndex], x, y, plane),
                clueType   : fields[clueTypeIndex],
                x          : x,
                y          : y,
                plane      : plane,
            ])
        }

        File outputFile = new File(outputDir, 'GeneratedReachabilityBenchmarkScenarios.java')
        outputFile.text = renderGeneratedBenchmarkSource(scenarios.values() as List<Map<String, Object>>)
    }
}

sourceSets {
    jmh {
        java.srcDir(generatedBenchmarkSourceDir)
    }
}

tasks.named('compileJmhJava') {
    dependsOn tasks.named('generateReachabilityBenchmarkParams')
}

tasks.register('heuristicVisualizer', JavaExec) {
    group = 'verification'
    description = 'Runs the developer heuristic visualizer CLI'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    def visualizerArgs = providers.gradleProperty('visualizerArgs')
    if (visualizerArgs.present) {
        args visualizerArgs.get().trim().split(/\s+/) as List<String>
    } else {
        args '--mode', 'BASE_MAP',
            '--output', 'build/heuristic-visualizer/full-basemap.png'
    }
}

tasks.register('heuristicVisualizerSearchSpace', JavaExec) {
    group = 'verification'
    description = 'Renders a fixed search-space visualization for a representative pathfinder query'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--start', '3222,3218,0',
        '--goal', '1503,3553,0',
        '--show-visited',
        '--show-path',
        '--output', 'build/heuristic-visualizer/search-space.png'
}

tasks.register('heuristicVisualizerSearchSpaceHeuristic', JavaExec) {
    group = 'verification'
    description = 'Renders the fixed search-space visualization using the component teleport heuristic'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'shortestpath.analysis.visualizer.HeuristicVisualizerMain'
    jvmArgs = ['-Xms1g', '-Xmx8g']
    args '--heuristic', 'component-teleport',
        '--start', '3222,3218,0',
        '--goal', '1503,3553,0',
        '--show-visited',
        '--show-path',
        '--output', 'build/heuristic-visualizer/search-space-heuristic.png'
}

tasks.register('heuristicVisualizerComponents', JavaExec) {
